<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Coffee Shop | Data Analysis Portfolio</title>
    <style>
        :root {
            --primary: #c4a484; /* Light Brown/Tan */
            --dark: #1a1a1a;    /* Near Black */
            --accent: #6f4e37;  /* Coffee Brown */
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 8%;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-size: 1.4rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 25px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

        /* Hero Section */
        .hero {
            height: 75vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 { font-size: 4.5rem; margin-bottom: 15px; letter-spacing: -2px; line-height: 1.1; }
        .hero p { font-size: 1.3rem; max-width: 700px; color: var(--primary); margin-bottom: 30px; font-style: italic; }

        /* Dashboard Container */
        .container {
            max-width: 1200px;
            margin: -120px auto 60px; /* Floating effect over hero */
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .dashboard-card {
            background: #ffffff;
            padding: 12px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 850px;
            border: none;
            border-radius: 18px;
        }

        /* Call to Action Button */
        .btn {
            background-color: var(--primary);
            color: var(--dark);
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn:hover { background-color: white; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        footer { padding: 60px 20px; text-align: center; font-size: 0.8rem; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">BRIGHT COFFEE</div>
    <div class="nav-links">
        <a href="#">Analysis</a>
        <a href="https://canva.link/c82u3uexhioj8nz" target="_blank">Strategy</a>
    </div>
</nav>

<section class="hero">
    <h1>Your morning, <br>optimized by data.</h1>
    <p>Transforming raw transactional data into high-growth retail intelligence.</p>
    <a href="https://canva.link/c82u3uexhioj8nz" class="btn" target="_blank">View Executive Presentation</a>
</section>

<div class="container">
    <div class="dashboard-card">
        <!-- YOUR LOOKER STUDIO DASHBOARD -->
        <iframe src="https://datastudio.google.com/embed/reporting/981bdc48-5b97-4db5-b057-08d734202d78/page/0y3wF" allowfullscreen></iframe>
    </div>
</div>

<footer>
    <p>PROFESSIONAL PORTFOLIO | DATA ANALYST & SOFTWARE ENGINEER</p>
    <p>POWERED BY SQL, LOOKER STUDIO & VERCEL</p>
</footer>

</body>
</html>
